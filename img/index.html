<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- comento di test-->
    <header class="page-header">
      <div class="page-header">
        <img src="./Logo.png" class="logo" alt="logo" />
        <h1 class="titolo-logo">Tobolist</h1>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="card">
          <div class="card-header">
            <button class="btn btn-primary">add ask</button>
            <button class="btn btn-secondary">add section</button>
          </div>

          <div class="card-body">
            <section class="todo-section">
              <h2 class="titolo-primary">
                <span>&blacktriangledown;</span>New Task
              </h2>
              <ul class="lista-primary">
                <li class="lista-secondary">
                  <span class="mark mark-success">&check;</span>
                  Recruitin blog post
                  <span class="label"> Editorial</span>
                </li>
              </ul>
              <ul class="lista-primary">
                <li class="lista-secondary">
                  <span class="mark mark-fail">&cross;</span>
                  Recruitin blog post
                  <span class="label"> Editorial</span>
                </li>
              </ul>
            </section>
            <section></section>
            <section></section>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
